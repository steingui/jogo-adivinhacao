apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-pvc
  labels:
    app: db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.db.storage.size }}
  {{- if .Values.db.storage.storageClass }}
  storageClassName: {{ .Values.db.storage.storageClass }}
  {{- end }}
